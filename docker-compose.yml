version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: groweasy-backend
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      PORT: 4000
      NODE_ENV: production
      CORS_ORIGIN: http://localhost:3000
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-10}
      CSV_BATCH_SIZE: ${CSV_BATCH_SIZE:-25}
      GEMINI_MAX_RETRIES: ${GEMINI_MAX_RETRIES:-3}
      GEMINI_RETRY_DELAY_MS: ${GEMINI_RETRY_DELAY_MS:-1000}
      GEMINI_CONCURRENCY: ${GEMINI_CONCURRENCY:-3}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-20}
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:4000/api/health', r => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
    container_name: groweasy-frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - backend
